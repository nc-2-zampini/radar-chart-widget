<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="Cambia tema" aria-pressed="false" title="Cambia tema">
    <span class="toggle-track">
      <span class="toggle-icon sun" aria-hidden="true">☀</span>
      <span class="toggle-icon moon" aria-hidden="true">☾</span>
      <span class="toggle-thumb"></span>
    </span>
  </button>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">Aesthetic skill profile</p>
      <h1>Radar chart clean.</h1>
      <p class="subtitle">Four centers.</p>

      <div class="card">
        <div class="chart-wrap">
          <canvas id="radarChart" aria-label="Radar chart delle skill" role="img"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
